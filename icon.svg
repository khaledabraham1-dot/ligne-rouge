  <rect x="0" y="440" width="512" height="72" fill="#C01D35"/>
  <!-- L blanc — position absolue -->
  <text x="56" y="390"
        font-family="Arial,Helvetica,sans-serif"
        font-size="270"
        font-weight="900"
